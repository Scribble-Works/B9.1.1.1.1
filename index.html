<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Precision | Scribble Works</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #727bcf;
            --success: #06cc91;
            --accent: #3ea0ad;
            --error: #f472b6;
            --space-deep: #020617;
            --space-glow: #1e1b4b;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, var(--space-glow), var(--space-deep));
            overflow: hidden;
            position: relative;
        }

        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .cosmic-waves-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50vh;
            background: linear-gradient(to bottom, transparent, rgba(114, 123, 207, 0.3));
            z-index: 1;
        }

        .waves {
            position: absolute;
            top: -120px;
            left: 0;
            width: 100%;
            height: 120px;
        }

        .parallax > use {
            animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
        }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; fill: rgba(114, 123, 207, 0.2); }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; fill: rgba(62, 160, 173, 0.3); }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; fill: rgba(114, 123, 207, 0.4); }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; fill: rgba(114, 123, 207, 0.6); }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        .game-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.08);
            padding: 2.5rem;
            border-radius: 35px;
            box-shadow: 0 0 30px rgba(114, 123, 207, 0.4);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            color: white;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            color: white;
            font-size: 2.2rem;
            margin: 0;
            text-shadow: 0 0 10px var(--primary);
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.75rem;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- Progress Bar --- */
        .mission-progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .question-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 1.5rem 1rem;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instruction {
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 10px;
        }

        .number-display {
            font-size: 2.8rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
            margin: 0;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            font-size: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            text-align: center;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(114, 123, 207, 0.4);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 18px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 6px 0px #4d5494;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #feedback {
            margin-top: 1rem;
            font-weight: 800;
            border-radius: 12px;
            padding: 10px;
            display: none;
            font-size: 0.9rem;
        }

        .correct { background: var(--success); color: white; display: block !important; }
        .wrong { background: var(--error); color: white; display: block !important; }

        /* --- Result Overlay --- */
        #victory-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--space-deep);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 35px;
        }
        img{float: left;}
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="cosmic-waves-container">
        <svg class="waves" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" />
                <use xlink:href="#gentle-wave" x="48" y="3" />
                <use xlink:href="#gentle-wave" x="48" y="5" />
                <use xlink:href="#gentle-wave" x="48" y="7" />
            </g>
        </svg>
    </div>

    <div class="game-container" id="game-card">
        <div id="victory-screen">
            <h1 style="font-size: 3rem;">MISSION COMPLETE</h1>
            <p id="final-stats" style="margin: 20px 0; font-size: 1.2rem;"></p>
            <button onclick="resetGame()" style="width: 200px;">NEW MISSION</button>
        </div>

        <div class="header">
            <img src="asset/photo_2026-02-10_07-43-14-removebg-preview.png" alt="logo" height="50">
            <h1>COSMIC ROUND</h1>
            <div class="stats-row">
                <div class="pill">STARS: <span id="score" style="color:var(--success)">0</span></div>
                <div class="pill">STREAK: <span id="streak" style="color:var(--error)">0</span> 🔥</div>
                <div class="pill">MISSION: <span id="q-count">1</span>/10</div>
            </div>
            <div class="mission-progress">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div class="question-card">
            <span id="instruction" class="instruction">SYSTEM BOOTING...</span>
            <div id="target-number" class="number-display">0.0000</div>
        </div>

        <input type="text" id="user-input" placeholder="Type answer..." autocomplete="off">
        <button id="action-btn" onclick="checkAnswer()">CHECK STATUS</button>

        <div id="feedback"></div>
    </div>

    <script>
        // --- Audio Context for Beeps ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if(type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            } else { // Victory
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- Create Stars ---
        const starBox = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            starBox.appendChild(star);
        }

        // --- Game Logic ---
        let score = 0, streak = 0, qIndex = 1, currentTask = {};
        const TOTAL_QUESTIONS = 10;

        function generate() {
            if (qIndex > TOTAL_QUESTIONS) {
                endGame();
                return;
            }

            document.getElementById('q-count').innerText = qIndex;
            document.getElementById('progress-fill').style.width = `${(qIndex / TOTAL_QUESTIONS) * 100}%`;

            const isSF = Math.random() > 0.5;
            const num = (Math.random() * 950 + 1).toFixed(Math.floor(Math.random() * 4) + 2);
            const precision = Math.floor(Math.random() * 3) + 1;

            currentTask = { val: parseFloat(num), prec: precision, type: isSF ? 'SF' : 'DP' };

            document.getElementById('target-number').innerText = currentTask.val;
            document.getElementById('instruction').innerText = isSF 
                ? `To ${precision} Significant Figures` 
                : `To ${precision} Decimal Places`;
            
            const input = document.getElementById('user-input');
            input.value = ''; 
            input.disabled = false;
            input.focus();
            document.getElementById('feedback').style.display = 'none';
        }

        function checkAnswer() {
            const user = document.getElementById('user-input').value.trim();
            if (!user) return;

            const fb = document.getElementById('feedback');
            const card = document.getElementById('game-card');
            let correct;

            if (currentTask.type === 'DP') {
                correct = currentTask.val.toFixed(currentTask.prec);
            } else {
                let sfResult = currentTask.val.toPrecision(currentTask.prec);
                correct = Number(sfResult).toString();
                if (sfResult.includes('.') && !correct.includes('.')) correct = sfResult;
            }

            if (user == correct) {
                score += 10; streak++;
                playSound('correct');
                fb.innerText = "MISSION SUCCESSFUL!";
                fb.className = "correct";
                qIndex++;
                setTimeout(generate, 1000);
            } else {
                streak = 0;
                playSound('wrong');
                card.classList.add('shake');
                fb.innerText = `CALIBRATION ERROR! Answer: ${correct}`;
                fb.className = "wrong";
                setTimeout(() => card.classList.remove('shake'), 400);
                qIndex++;
                setTimeout(generate, 1800);
            }
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
        }

        function endGame() {
            playSound('victory');
            const vic = document.getElementById('victory-screen');
            const stats = document.getElementById('final-stats');
            vic.style.display = 'flex';
            
            let rank = score >= 80 ? "GALAXY COMMANDER" : score >= 50 ? "SPACE PILOT" : "CADET";
            stats.innerHTML = `Final Score: ${score}<br>Rank: ${rank}`;
        }

        function resetGame() {
            score = 0; streak = 0; qIndex = 1;
            document.getElementById('score').innerText = "0";
            document.getElementById('streak').innerText = "0";
            document.getElementById('victory-screen').style.display = 'none';
            generate();
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') checkAnswer(); 
        });

        // Initialize
        generate();
    </script>
</body>
</html>
